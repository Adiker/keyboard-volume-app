name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "cpp/**"
      - "pkg/**"
      - "deploy/**"
      - "resources/**"
      - "**/CMakeLists.txt"
      - "**/*.cmake"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "cpp/**"
      - "pkg/**"
      - "deploy/**"
      - "resources/**"
      - "**/CMakeLists.txt"
      - "**/*.cmake"

jobs:
  format:
    name: Format changed C++ files
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check changed C++ files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            range="${base_sha}...HEAD"
          else
            range="HEAD~1...HEAD"
          fi

          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "${range}" \
              | grep -E '^cpp/(src|tests)/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$' \
              || true
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No changed C++ files under cpp/src or cpp/tests."
            exit 0
          fi

          printf 'Checking format for:\n'
          printf '  %s\n' "${files[@]}"
          clang-format --dry-run --Werror "${files[@]}"

  clang-tidy:
    name: Clang-Tidy changed C++ files
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            clang-tidy \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6dbus6 \
            libgtest-dev \
            libevdev-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libtag1-dev \
            libwayland-dev \
            dbus

      - name: Configure (generate compile_commands.json)
        run: >
          cmake
          -S cpp
          -B cpp/build-tidy
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++

      - name: Generate automoc files
        run: cmake --build cpp/build-tidy --target keyboard-volume-app_autogen

      - name: Run clang-tidy on changed C++ files
        shell: bash
        run: |
          set -uo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            range="${base_sha}...HEAD"
          else
            range="HEAD~1...HEAD"
          fi

          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "${range}" \
              | grep -E '^cpp/(src|tests)/.*\.(cpp|cc|cxx)$' \
              || true
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No changed C++ source files under cpp/src or cpp/tests."
            exit 0
          fi

          printf 'Running clang-tidy on:\n'
          printf '  %s\n' "${files[@]}"

          exit_code=0
          for f in "${files[@]}"; do
            clang-tidy -p cpp/build-tidy "${f}" || exit_code=$?
          done

          if [[ "${exit_code}" -ne 0 ]]; then
            echo "::warning::clang-tidy reported issues (warning-only, not blocking merge)."
          fi
          exit "${exit_code}"

  build:
    name: Build and test (${{ matrix.build_type }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6dbus6 \
            libgtest-dev \
            libevdev-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libtag1-dev \
            libwayland-dev \
            dbus \
            rpm

      - name: Configure
        run: >
          cmake
          -S cpp
          -B cpp/build-${{ matrix.build_type }}
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build cpp/build-${{ matrix.build_type }}

      - name: Test
        run: |
          # Run tests that don't need D-Bus directly
          ctest --test-dir cpp/build-${{ matrix.build_type }} --output-on-failure \
            --exclude-regex test_mprisclient
          # Run test_mprisclient under dbus-run-session
          dbus-run-session -- ctest \
            --test-dir cpp/build-${{ matrix.build_type }} --output-on-failure \
            -R test_mprisclient

      - name: Build packages (Release only)
        if: matrix.build_type == 'Release'
        run: |
          cd cpp/build-Release
          cpack -G "DEB;RPM"

      - name: Verify packages (Release only)
        if: matrix.build_type == 'Release'
        run: |
          cd cpp/build-Release
          echo "=== Verifying DEB Package ==="
          dpkg-deb -I keyboard-volume-app_*.deb
          dpkg-deb -c keyboard-volume-app_*.deb | tee deb-contents.txt

          echo "=== Verifying RPM Package ==="
          rpm -qip keyboard-volume-app-*.rpm
          rpm -qlp keyboard-volume-app-*.rpm | tee rpm-contents.txt

          # Check for presence of key files in the DEB package content listing
          grep -q "usr/bin/keyboard-volume-app" deb-contents.txt
          grep -q "usr/bin/kv-ctl" deb-contents.txt
          grep -q "usr/share/applications/keyboard-volume-app.desktop" deb-contents.txt
          grep -q "usr/share/pixmaps/keyboard-volume-app.png" deb-contents.txt
          grep -q "usr/lib/systemd/user/keyboard-volume-app.service" deb-contents.txt

          # Check for presence of key files in the RPM package content listing
          grep -q "usr/bin/keyboard-volume-app" rpm-contents.txt
          grep -q "usr/bin/kv-ctl" rpm-contents.txt
          grep -q "usr/share/applications/keyboard-volume-app.desktop" rpm-contents.txt
          grep -q "usr/share/pixmaps/keyboard-volume-app.png" rpm-contents.txt
          grep -q "usr/lib/systemd/user/keyboard-volume-app.service" rpm-contents.txt

      - name: Upload packages as artifacts (Release only)
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-volume-app-packages
          path: |
            cpp/build-Release/*.deb
            cpp/build-Release/*.rpm
